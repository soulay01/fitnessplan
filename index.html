<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#F5F5F0">
<title>Fitnessplan</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#F5F5F0;
  --card:#FFFFFF;
  --card2:#F0F0EA;
  --border:#E0DDD6;
  --text:#1A1A18;
  --muted:#8A8A80;
  --sub:#5A5A52;
  --accent:#3D8B00;
  --accent-bg:rgba(61,139,0,0.08);
  --accent-border:rgba(61,139,0,0.25);
  --blue:#0070CC;
  --blue-bg:rgba(0,112,204,0.08);
  --orange:#C44A00;
  --orange-bg:rgba(196,74,0,0.08);
  --purple:#7B3FB0;
  --purple-bg:rgba(123,63,176,0.08);
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'SF Pro Text','Segoe UI',sans-serif}
#app{display:flex;flex-direction:column;height:100%}
#header{padding:52px 20px 16px;flex-shrink:0;background:var(--bg)}
.h-sub{font-size:11px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.h-title{font-size:20px;font-weight:700;letter-spacing:-0.3px}
.goal-row{display:flex;gap:6px;align-items:center;margin-top:10px;flex-wrap:wrap}
.gc{padding:5px 11px;border-radius:8px;font-size:12px;font-weight:600}
.gc-a{background:var(--card);border:1px solid var(--border);color:var(--sub)}
.gc-b{background:var(--accent-bg);border:1px solid var(--accent-border);color:var(--accent);font-weight:700}
.gc-c{background:var(--card);border:1px solid var(--border);color:var(--muted);font-size:11px}
.arr{color:var(--muted);font-size:14px}
#scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 16px 16px}
#scroll-area::-webkit-scrollbar{display:none}
#tabs{display:flex;background:var(--card);border-top:1px solid var(--border);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px);box-shadow:0 -1px 0 var(--border)}
.tab{flex:1;padding:12px 0 10px;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;border:none;background:none;color:var(--muted);transition:color .15s}
.tab.active{color:var(--accent)}
.tab-icon{font-size:20px;line-height:1}
.tab-lbl{font-size:10px;font-weight:600;letter-spacing:.3px}
.chip-row{display:flex;gap:6px;overflow-x:auto;padding:4px 0 10px;scrollbar-width:none;margin:0 -4px;padding-left:4px}
.chip-row::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:var(--card);color:var(--muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.chip.push.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent)}
.chip.pull.on{background:var(--blue-bg);border-color:rgba(77,175,255,.4);color:var(--blue)}
.chip.legs.on{background:var(--orange-bg);border-color:rgba(255,107,53,.4);color:var(--orange)}
.chip.ath.on{background:var(--purple-bg);border-color:rgba(192,132,252,.4);color:var(--purple)}
.chip.rest.on{background:var(--card2);border-color:var(--border);color:var(--sub)}
.chip.meal.on{background:var(--accent-bg);border-color:var(--accent-border);color:var(--accent);font-weight:700}
.sec{font-size:11px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px}
.card+.card{margin-top:8px}
.card-title{font-size:15px;font-weight:600;margin-bottom:4px}
.card-sub{font-size:12px;color:var(--sub);margin-bottom:0}
.ex-name{font-size:14px;font-weight:600;margin-bottom:8px}
.badges{display:flex;gap:6px;flex-wrap:wrap}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
.b-acc{background:var(--accent-bg);color:var(--accent)}
.b-blue{background:var(--blue-bg);color:var(--blue)}
.b-org{background:var(--orange-bg);color:var(--orange)}
.b-pur{background:var(--purple-bg);color:var(--purple)}
.b-gray{background:var(--card2);color:var(--muted)}
.note{font-size:12px;color:var(--muted);margin-top:6px;padding-left:2px}
.day-hd{margin-bottom:14px}
.day-lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:2px}
.lbl-push{color:var(--accent)} .lbl-pull{color:var(--blue)} .lbl-legs{color:var(--orange)} .lbl-ath{color:var(--purple)} .lbl-rest{color:var(--muted)}
.day-name{font-size:19px;font-weight:700;letter-spacing:-.3px}
.day-focus{font-size:13px;color:var(--muted);margin-top:2px}
.rest-box{background:var(--card);border:1px dashed var(--border);border-radius:12px;padding:36px 20px;text-align:center}
.rest-em{font-size:36px;margin-bottom:10px}
.rest-t{font-size:16px;font-weight:600;margin-bottom:4px}
.rest-s{font-size:13px;color:var(--muted)}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:4px}
.m-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center}
.m-val{font-size:18px;font-weight:700;line-height:1.1}
.m-lbl{font-size:10px;color:var(--muted);margin-top:2px;font-weight:500}
.meal-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px}
.meal-t{font-size:15px;font-weight:600;margin-bottom:6px}
.meal-d{font-size:13px;color:var(--sub);line-height:1.55;margin-bottom:10px}
.shake-card{background:rgba(61,139,0,0.06);border:1px solid rgba(61,139,0,0.20);border-radius:12px;padding:14px;margin-bottom:8px}
.shake-t{font-size:15px;font-weight:600;color:var(--accent);margin-bottom:8px}
.ing{font-size:13px;color:var(--sub);padding:3px 0;display:flex;gap:6px;align-items:center}
.ing::before{content:"·";color:var(--accent);font-weight:700;flex-shrink:0}
.prog-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.prog-card.peak{border-color:rgba(170,255,69,.3)}
.wnum{width:38px;height:38px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0;background:var(--card2);color:var(--muted)}
.wnum.peak{background:var(--accent-bg);color:var(--accent)}
.prog-t{font-size:14px;font-weight:600;margin-bottom:3px}
.prog-d{font-size:13px;color:var(--sub);line-height:1.4}
.rule-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;display:flex;gap:12px;align-items:flex-start}
.rule-em{font-size:22px;flex-shrink:0;margin-top:1px}
.rule-t{font-size:14px;font-weight:600;margin-bottom:3px}
.rule-d{font-size:13px;color:var(--sub);line-height:1.4}
.mday-h{font-size:16px;font-weight:700;margin-bottom:2px}
.mday-s{font-size:12px;color:var(--muted);margin-bottom:14px}
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div class="h-sub">4-Wochen Plan · Lean Bulk</div>
    <div class="h-title">Fitnessplan 💪</div>
    <div class="goal-row">
      <span class="gc gc-a">~62 kg</span>
      <span class="arr">→</span>
      <span class="gc gc-b">🎯 70 kg</span>
      <span class="gc gc-c">+3.000 kcal/Tag</span>
    </div>
  </div>
  <div id="scroll-area"></div>
  <div id="tabs">
    <button class="tab active" onclick="setTab('training')" id="t-training">
      <span class="tab-icon">🏋️</span><span class="tab-lbl">Training</span>
    </button>
    <button class="tab" onclick="setTab('essen')" id="t-essen">
      <span class="tab-icon">🥗</span><span class="tab-lbl">Ernährung</span>
    </button>
    <button class="tab" onclick="setTab('plan')" id="t-plan">
      <span class="tab-icon">📈</span><span class="tab-lbl">Progression</span>
    </button>
  </div>
</div>
<script>
const D=[
  {day:"Montag",lbl:"PUSH",cls:"push",focus:"Brust · Schultern · Trizeps",ex:[
    {n:"Bankdrücken (Langhantel)",s:"4",r:"6–8",note:"Hauptübung – maximales Gewicht"},
    {n:"Schrägbank KH-Drücken",s:"3",r:"10",note:""},
    {n:"Schulterdrücken KH",s:"4",r:"10",note:"Stehend oder sitzend"},
    {n:"Dips (Power Station)",s:"3",r:"Max",note:"Ziel: 12+ Wdh., ggf. gewichtet"},
    {n:"Seitliches Schulterheben",s:"3",r:"15",note:"Langsam & kontrolliert"},
    {n:"Trizeps Overhead Extension",s:"3",r:"12",note:""},
  ]},
  {day:"Dienstag",lbl:"PULL",cls:"pull",focus:"Rücken · Bizeps",ex:[
    {n:"Klimmzüge (weiter Griff)",s:"4",r:"Max",note:"Ziel: 8–12 Wdh."},
    {n:"Langhantelrudern (vorgebeugt)",s:"4",r:"8",note:"Rücken gerade halten"},
    {n:"Einarmiges KH-Rudern",s:"3",r:"10/Seite",note:""},
    {n:"Chinups (supiniert, eng)",s:"3",r:"8",note:"Bizeps-Fokus"},
    {n:"KH Bizepscurls alternierend",s:"3",r:"12",note:""},
    {n:"Hammer Curls",s:"3",r:"12",note:""},
  ]},
  {day:"Mittwoch",lbl:"REST",cls:"rest",focus:"Aktive Erholung",ex:[]},
  {day:"Donnerstag",lbl:"LEGS",cls:"legs",focus:"Beine · Core",ex:[
    {n:"Kniebeuge (Langhantel)",s:"4",r:"8",note:"Hauptübung – tief gehen"},
    {n:"Rumänisches Kreuzheben",s:"4",r:"8",note:"Hamstring-Fokus"},
    {n:"Bulgarian Split Squat",s:"3",r:"10/Bein",note:"KH in beiden Händen"},
    {n:"Ausfallschritte KH",s:"3",r:"12/Bein",note:""},
    {n:"Wadenheben (einbeinig)",s:"4",r:"20",note:""},
    {n:"Core: Crunches + Leg Raises + Plank",s:"3",r:"–",note:"Plank je 60s halten"},
  ]},
  {day:"Freitag",lbl:"REST",cls:"rest",focus:"Erholung",ex:[]},
  {day:"Samstag",lbl:"ATHLETIC",cls:"ath",focus:"Kraft · Explosivität · Core",ex:[
    {n:"Kreuzheben (Langhantel)",s:"4",r:"5",note:"Schwer – neue PRs anstreben"},
    {n:"Klimmzüge (gewichtet)",s:"3",r:"8",note:"KH zwischen den Füßen"},
    {n:"Dips (gewichtet)",s:"3",r:"8",note:""},
    {n:"Explosive Push-ups (Plyometrisch)",s:"3",r:"10",note:""},
    {n:"Turkish Get-Up",s:"2",r:"5/Seite",note:"Koordination & Stabilität"},
    {n:"Russian Twists + Plank",s:"3",r:"20 + 60s",note:"Core-Abschluss"},
  ]},
  {day:"Sonntag",lbl:"REST",cls:"rest",focus:"Vollständige Erholung",ex:[]},
];

const SHAKE={
  ings:["500ml Vollmilch (kalt)","80g Haferflocken","2 Kugeln Whey – Geschmack wählen: Schoko, Vanilla oder Erdbeere","1 Banane (tiefgefroren = cremiger)","1 EL Erdnussbutter","Optional: 1 TL Honig oder Kakaopulver für mehr Geschmack"],
  kcal:960,prot:78
};

const M=[
  {day:"Montag",
   m1:{t:"Overnight Oats Schoko-PB",d:"Abends 2 Min: 80g Haferflocken + 350ml Milch + 1 EL Kakaopulver + 1 EL Erdnussbutter + 1 Kugel Whey in Glas schichten. Kühlschrank. Morgens mit Banane toppen – schmeckt wie Dessert.",k:780,p:52},
   m2:{t:"Pasta Carbonara mit Hähnchen",d:"200g Pasta kochen. 200g Hähnchen würfeln & anbraten. 3 Eigelb + 60g Parmesan + Schuss Nudelwasser verrühren. Hitze aus, Sauce drüber, sofort mischen. Pfeffer drauf. Fertig in 20 Min.",k:1100,p:72}},
  {day:"Dienstag",
   m1:{t:"French Toast",d:"3 Eier + 100ml Milch + Zimt verquirlen. 4 dicke Toastscheiben drin tränken, in Butter goldbraun braten. Mit Erdnussbutter + Ahornsirup + Banane servieren.",k:820,p:38},
   m2:{t:"Burrito Bowl",d:"180g Reis kochen. 250g Hähnchen mit Taco-Gewürz (Paprika, Kreuzkümmel, Knoblauch) scharf anbraten. Mais + Kidney-Bohnen aus Dose. 1 Avocado zerdrücken. Alles in Bowl schichten, Salsa drüber. Mega.",k:1100,p:78}},
  {day:"Mittwoch",
   m1:{t:"Joghurt Parfait",d:"400g Griechischer Joghurt (10% Fett) in Bowl. 70g Granola drüber. 1 Banane in Scheiben. 2 EL Honig. Optional 1 Kugel Whey einrühren. Kein Kochen, 2 Min., schmeckt nach Urlaub.",k:810,p:48},
   m2:{t:"Chicken Teriyaki Bowl",d:"250g Hähnchenschenkel (saftiger als Brust!) in Pfanne. Sauce: 4 EL Sojasauce + 2 EL Honig + 1 TL Ingwer mischen, drübergiessen, karamellisieren lassen. 180g Reis. Brokkoli.",k:1050,p:72}},
  {day:"Donnerstag",
   m1:{t:"PB-Bananen Toast",d:"4 Scheiben gutes Brot toasten. 3 EL Erdnussbutter draufschmieren. 1 Banane in Scheiben. 1 TL Honig. Dazu 1 Glas Vollmilch (300ml). Klingt simpel, hält ewig satt.",k:820,p:38},
   m2:{t:"Döner Bowl",d:"300g Hähnchen mit Gyros-Gewürz (gibt's fertig im Supermarkt) scharf anbraten. 2 Pita aufwärmen oder 180g Reis. Tzatziki aus dem Kühlregal. Tomaten, Zwiebeln, Salat drüber. Wie beim Türken, nur zuhause.",k:1050,p:78}},
  {day:"Freitag",
   m1:{t:"Smoothie Bowl",d:"500ml Vollmilch + 1 gefrorene Banane + 2 Kugeln Whey + 1 EL Erdnussbutter in Mixer. In Bowl giessen, 60g Granola drüber, Beeren, Honig. Sieht aus wie Instagram, schmeckt besser.",k:860,p:62},
   m2:{t:"Pasta Bolognese",d:"250g Rinderhack mit Zwiebeln & Knoblauch anbraten. Fertige Bolognese-Sauce aus dem Glas dazu (kein Scheiß, schmeckt gut). 200g Pasta kochen. Parmesan drüber. Klassiker bleibt Klassiker.",k:1080,p:68}},
  {day:"Samstag",
   m1:{t:"Richtige Pancakes",d:"150g Mehl + 2 Eier + 200ml Milch + 1 TL Backpulver + Prise Salz mixen. In Butter bei mittlerer Hitze backen. Mit Ahornsirup, Erdnussbutter und Banane. Dazu 200g Joghurt.",k:860,p:42},
   m2:{t:"Hähnchenschenkel aus dem Ofen",d:"4 Hähnchenschenkel (Oberschenkel) mit Olivenöl, Paprika, Knoblauch, Salz & Pfeffer einreiben. 500g Kartoffeln als Wedges daneben. Alles aufs Blech, 45 Min. bei 200°. Minimaler Aufwand, maximaler Geschmack.",k:1200,p:82}},
  {day:"Sonntag",
   m1:{t:"Avocado Toast mit Ei",d:"3 Scheiben Sauerteigbrot toasten. 1 Avocado mit Zitrone + Salz zerdrücken, draufschmieren. 3 Spiegeleier braten. Chiliflocken drüber. Fertig in 10 Min.",k:780,p:40},
   m2:{t:"Chicken Wrap Triple",d:"3 Tortilla Wraps in Pfanne kurz erwärmen. 250g Hähnchen (Paprika, Knoblauch) braten & in Streifen schneiden. Mit Käse, Salat, Tomate & Chili-Sauce belegen, einrollen. Einfach, schnell, lecker.",k:1050,p:72}},
];

const PROG=[
  {w:1,t:"Basis",d:"Bewegungen einschleifen. Moderate Gewichte. Ausführung vor Gewicht. Alles lernen.",pk:false},
  {w:2,t:"Aufbau",d:"+2.5–5 kg auf alle Hauptübungen. Gleiches Volumen beibehalten.",pk:false},
  {w:3,t:"Overload",d:"+1 Satz auf Push/Pull/Legs Hauptübungen. Intensität erhöhen.",pk:false},
  {w:4,t:"Peak",d:"Maximale Intensität. Neue PRs testen. Endgewicht am Monatsende notieren.",pk:true},
];

const RULES=[
  {em:"⚖️",t:"Wöchentlich wiegen",d:"Immer morgens nüchtern. Ziel: +0.5–1 kg pro Monat für Lean Bulk."},
  {em:"😴",t:"Schlaf ist Training",d:"Mindestens 7–8 Stunden. Kein Schlaf = kein Muskelaufbau. Kein Kompromiss."},
  {em:"💧",t:"3 Liter Wasser/Tag",d:"Mehr als du denkst. Fördert Recovery und verhindert Scheinplateaus."},
  {em:"📊",t:"Progressive Overload",d:"Jede Woche 2.5–5 kg mehr drauflegen. Das ist der einzige Weg zum Wachstum."},
  {em:"🔁",t:"Konsistenz schlägt alles",d:"4 Wochen knallhart durchziehen, dann Plan anpassen. Kein Abweichen."},
  {em:"🥩",t:"Protein immer zuerst",d:"Wenn du mal weniger isst, Protein trotzdem sicherstellen. Rest ist egal."},
];

let activeTab='training', activeDay=0, activeMeal=0;

function bc(cls){
  if(cls==='push') return 'b-acc';
  if(cls==='pull') return 'b-blue';
  if(cls==='legs') return 'b-org';
  if(cls==='ath') return 'b-pur';
  return 'b-gray';
}

function renderTraining(){
  const d=D[activeDay];
  const b=bc(d.cls);
  let chips=D.map((x,i)=>`<button class="chip ${x.cls}${activeDay===i?' on':''}" onclick="sd(${i})">${x.lbl}</button>`).join('');
  let body='';
  if(!d.ex.length){
    body=`<div class="rest-box"><div class="rest-em">😴</div><div class="rest-t">Ruhetag</div><div class="rest-s">${d.focus}<br>Spazieren gehen, dehnen, viel essen</div></div>`;
  } else {
    body=d.ex.map(e=>`<div class="card"><div class="ex-name">${e.n}</div><div class="badges"><span class="badge ${b}">${e.s} Sätze</span><span class="badge b-blue">${e.r} Wdh.</span></div>${e.note?`<div class="note">→ ${e.note}</div>`:''}</div>`).join('');
  }
  document.getElementById('scroll-area').innerHTML=`
    <div class="chip-row">${chips}</div>
    <div class="day-hd">
      <div class="day-lbl lbl-${d.cls}">${d.lbl}</div>
      <div class="day-name">${d.day}</div>
      <div class="day-focus">${d.focus}</div>
    </div>
    ${body}
    <div style="height:8px"></div>
  `;
}

function renderEssen(){
  const m=M[activeMeal];
  const tk=m.m1.k+SHAKE.kcal+m.m2.k;
  const tp=m.m1.p+SHAKE.prot+m.m2.p;
  let chips=M.map((x,i)=>`<button class="chip meal${activeMeal===i?' on':''}" onclick="sm(${i})">${x.day.slice(0,2)}</button>`).join('');
  let ings=SHAKE.ings.map(i=>`<div class="ing">${i}</div>`).join('');
  document.getElementById('scroll-area').innerHTML=`
    <div class="macro-grid">
      <div class="m-card"><div class="m-val" style="color:var(--accent)">3.000</div><div class="m-lbl">kcal/Tag</div></div>
      <div class="m-card"><div class="m-val" style="color:var(--blue)">185g</div><div class="m-lbl">Protein</div></div>
      <div class="m-card"><div class="m-val" style="color:var(--orange)">330g</div><div class="m-lbl">Carbs</div></div>
      <div class="m-card"><div class="m-val" style="color:var(--purple)">80g</div><div class="m-lbl">Fett</div></div>
    </div>
    <div class="chip-row" style="margin-top:4px">${chips}</div>
    <div class="mday-h">${m.day}</div>
    <div class="mday-s">~${tk} kcal gesamt · ~${tp}g Protein</div>
    <div class="sec">🍳 Mahlzeit 1 – morgens</div>
    <div class="meal-card">
      <div class="meal-t">${m.m1.t}</div>
      <div class="meal-d">${m.m1.d}</div>
      <div class="badges"><span class="badge b-blue">${m.m1.k} kcal</span><span class="badge b-acc">${m.m1.p}g Protein</span></div>
    </div>
    <div class="sec">🥤 Mass Shake – post-workout oder mittags</div>
    <div class="shake-card">
      <div class="shake-t">DIY Mass Shake (täglich gleich)</div>
      ${ings}
      <div class="badges" style="margin-top:10px"><span class="badge b-acc">${SHAKE.kcal} kcal</span><span class="badge b-acc">${SHAKE.prot}g Protein</span><span class="badge b-gray">Alles in Mixer → fertig</span></div>
    </div>
    <div class="sec">🍽️ Mahlzeit 2 – abends</div>
    <div class="meal-card">
      <div class="meal-t">${m.m2.t}</div>
      <div class="meal-d">${m.m2.d}</div>
      <div class="badges"><span class="badge b-org">${m.m2.k} kcal</span><span class="badge b-acc">${m.m2.p}g Protein</span></div>
    </div>
    <div style="height:8px"></div>
  `;
}

function renderPlan(){
  let prog=PROG.map(p=>`<div class="prog-card${p.pk?' peak':''}"><div class="wnum${p.pk?' peak':''}">W${p.w}</div><div><div class="prog-t">Woche ${p.w}: ${p.t}</div><div class="prog-d">${p.d}</div></div></div>`).join('');
  let rules=RULES.map(r=>`<div class="rule-card"><div class="rule-em">${r.em}</div><div><div class="rule-t">${r.t}</div><div class="rule-d">${r.d}</div></div></div>`).join('');
  document.getElementById('scroll-area').innerHTML=`
    <div class="sec">4-Wochen Progression</div>
    ${prog}
    <div class="sec" style="margin-top:20px">Regeln für Lean Bulk</div>
    ${rules}
    <div style="background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;margin-top:8px;text-align:center">
      <div style="font-size:22px;margin-bottom:6px">🏁</div>

}

function setTab(t){
  activeTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.getElementById('t-'+t).classList.add('active');
  render();
}
function sd(i){activeDay=i;renderTraining();}
function sm(i){activeMeal=i;renderEssen();}
function render(){
  if(activeTab==='training') renderTraining();
  else if(activeTab==='essen') renderEssen();
  else renderPlan();
}
render();
</script>
